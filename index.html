<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador OTDR Interativo</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      :root {
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        background: whitesmoke;
        color: black;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin-top: 0;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(260px, 320px) 1fr;
        gap: 20px;
      }

      .panel,
      .chart-panel {
        background: white;
        border: 1px solid lightgray;
        border-radius: 10px;
        padding: 16px;
      }

      .control {
        margin-bottom: 18px;
      }

      .control label,
      .control legend {
        font-weight: 700;
        margin-bottom: 8px;
        display: block;
      }

      fieldset {
        border: 1px solid silver;
        border-radius: 8px;
      }

      .radio-group {
        display: flex;
        gap: 14px;
        padding: 4px 0 0;
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      input[type='range'] {
        width: 100%;
      }

      .value-badge {
        min-width: 34px;
        text-align: right;
        font-weight: 700;
      }

      #summary {
        margin-top: 14px;
        line-height: 1.4;
      }

      .axis-label {
        font-size: 12px;
        fill: dimgray;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Simulador OTDR para Controle de Qualidade de Fibra</h1>
      <div class="layout">
        <section class="panel" aria-label="Controles de manufatura">
          <div class="control">
            <fieldset>
              <legend>Comprimento de Onda</legend>
              <div class="radio-group">
                <label>
                  <input type="radio" name="wavelength" value="1310" />
                  1310 nm
                </label>
                <label>
                  <input type="radio" name="wavelength" value="1550" checked />
                  1550 nm
                </label>
              </div>
            </fieldset>
          </div>

          <div class="control">
            <label for="tension">Tensão de Enrolamento</label>
            <div class="slider-row">
              <input id="tension" type="range" min="0" max="100" value="0" />
              <span id="tensionValue" class="value-badge">0</span>
            </div>
          </div>

          <div class="control">
            <label for="thermal">Instabilidade Térmica da Torre</label>
            <div class="slider-row">
              <input id="thermal" type="range" min="0" max="100" value="0" />
              <span id="thermalValue" class="value-badge">0</span>
            </div>
          </div>

          <div class="control">
            <label>
              <input id="defect" type="checkbox" />
              Inserir Bolha/Impureza no km 5
            </label>
          </div>
        </section>

        <section class="chart-panel">
          <svg id="chart" width="620" height="360" role="img" aria-label="Traço OTDR"></svg>
          <p id="summary"></p>
        </section>
      </div>
    </div>

    <script>
      const ATTENUATION_SLOPES = {
        '1310': 0.35,
        '1550': 0.2
      };
      const MACROBEND_SENSITIVITY = {
        '1310': 0.9,
        '1550': 2.1
      };
      const MAX_DISTANCE = 10;
      const DISTANCE_STEP = 0.1;
      const DISTANCE_EPSILON = 0.0001;

      const state = {
        wavelength: '1550',
        tension: 0,
        thermal: 0,
        defect: false
      };

      const svg = d3.select('#chart');
      const width = Number(svg.attr('width'));
      const height = Number(svg.attr('height'));
      const margin = { top: 20, right: 20, bottom: 48, left: 58 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const g = svg
        .append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      const xScale = d3.scaleLinear().domain([0, MAX_DISTANCE]).range([0, innerWidth]);
      const yScale = d3.scaleLinear().domain([4, 10]).range([innerHeight, 0]);

      const xAxisGroup = g
        .append('g')
        .attr('transform', `translate(0,${innerHeight})`)
        .call(d3.axisBottom(xScale).ticks(10));

      const yAxisGroup = g.append('g').call(d3.axisLeft(yScale).ticks(7));

      g.append('text')
        .attr('class', 'axis-label')
        .attr('x', innerWidth / 2)
        .attr('y', innerHeight + 38)
        .attr('text-anchor', 'middle')
        .text('Distância (km)');

      g.append('text')
        .attr('class', 'axis-label')
        .attr('transform', 'rotate(-90)')
        .attr('x', -innerHeight / 2)
        .attr('y', -42)
        .attr('text-anchor', 'middle')
        .text('Potência Óptica (dB)');

      const linePath = g
        .append('path')
        .attr('fill', 'none')
        .attr('stroke', 'steelblue')
        .attr('stroke-width', 2.6)
        .attr('stroke-linejoin', 'round');

      const line = d3
        .line()
        .x((d) => xScale(d.x))
        .y((d) => yScale(d.y));

      function computePowerAtDistance(x) {
        const baseSlope = ATTENUATION_SLOPES[state.wavelength];
        let y = 10 - baseSlope * x;

        if (x >= 4) {
          y -= (state.thermal / 100) * 0.45;
        }

        if (x >= 7) {
          y -= (state.thermal / 100) * 0.55;
        }

        if (x > 8) {
          const normalized = (x - 8) / 2;
          const sensitivity = MACROBEND_SENSITIVITY[state.wavelength];
          y -= (state.tension / 100) * sensitivity * normalized * normalized;
        }

        if (state.defect && x >= 5.03) {
          y -= 1;
        }

        return y;
      }

      function generateTrace() {
        const points = [];
        for (let x = 0; x <= MAX_DISTANCE + DISTANCE_EPSILON; x += DISTANCE_STEP) {
          points.push({ x: Number(x.toFixed(2)), y: computePowerAtDistance(x) });
        }

        if (state.defect) {
          const baseBeforeDefect = computePowerAtDistance(4.98);
          points.push({ x: 4.99, y: baseBeforeDefect });
          points.push({ x: 5.0, y: baseBeforeDefect + 1.2 });
          points.push({ x: 5.03, y: baseBeforeDefect - 1.0 });
          points.sort((a, b) => a.x - b.x);
        }

        return points;
      }

      function buildSummary() {
        const wavelengthText =
          state.wavelength === '1310'
            ? '1310 nm selecionado: atenuação linear mais acentuada ao longo da fibra.'
            : '1550 nm selecionado: atenuação linear mais suave, porém maior sensibilidade a macrocurvaturas.';

        const tensionText =
          state.tension === 0
            ? 'Sem tensão de enrolamento adicional no carretel.'
            : `Tensão em ${state.tension}: há penalidade progressiva entre km 8 e 10${
                state.wavelength === '1550' ? ', com queda profunda típica em 1550 nm.' : '.'
              }`;

        const thermalText =
          state.thermal === 0
            ? 'Torre estável: sem perdas em degrau por oscilação térmica.'
            : `Instabilidade térmica em ${state.thermal}: perdas em degrau visíveis próximas dos km 4 e 7.`;

        const defectText = state.defect
          ? 'Defeito ativado no km 5: pico refletivo seguido de queda abrupta de potência.'
          : 'Sem bolha/impureza inserida no km 5.';

        return `${wavelengthText} ${tensionText} ${thermalText} ${defectText}`;
      }

      function render() {
        const data = generateTrace();
        linePath.datum(data).attr('d', line);

        d3.select('#summary').text(buildSummary());

        d3.select('#tensionValue').text(state.tension);
        d3.select('#thermalValue').text(state.thermal);

        xAxisGroup.call(d3.axisBottom(xScale).ticks(10));
        yAxisGroup.call(d3.axisLeft(yScale).ticks(7));
      }

      d3.selectAll('input[name="wavelength"]').on('change', (event) => {
        state.wavelength = event.target.value;
        render();
      });

      d3.select('#tension').on('input', (event) => {
        state.tension = Number(event.target.value);
        render();
      });

      d3.select('#thermal').on('input', (event) => {
        state.thermal = Number(event.target.value);
        render();
      });

      d3.select('#defect').on('change', (event) => {
        state.defect = event.target.checked;
        render();
      });

      render();
    </script>
  </body>
</html>
